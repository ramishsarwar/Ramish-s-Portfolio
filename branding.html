<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Branding Work</title>

<link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#050510;
  color:#fff;
  font-family:Inter;
  padding:80px 10%;
}

h1{
  font-size:3rem;
  font-weight:300;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  margin-top:40px;
}

.item{
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
}

.item:hover{
  transform:scale(1.03);
  border-color:#59ffbf;
}

.item img{
  width:100%;
  height:260px;
  object-fit:cover;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal img{
  max-width:80%;
  max-height:80%;
  border-radius:12px;
}

.close{
  position:absolute;
  top:30px;
  right:40px;
  font-size:2rem;
  cursor:pointer;
  color:#fff;
}
.back-btn{
  position:fixed;
  top:28px;


  padding:8px 14px;
  font-size:.85rem;

  color:#59ffbf;
  text-decoration:none;

  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.08);
  border-radius:30px;

  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);

  transition:.3s ease;
  z-index:9999;
}

/* hover matches your theme */
.back-btn:hover{
  background:#59ffbf;
  color:#000;
  border-color:#59ffbf;
  transform:translateX(-6px);
  box-shadow:0 10px 30px rgba(89,255,191,.15);
}
</style>
</head>

<body>
   
 <a href="index.html" class="back-btn">← Back to Portfolio</a>
<h1>Branding & Visual Work</h1>

<div class="grid">

  <div class="item"><img src="Everlane Logo.png"></div>
  <div class="item"><img src="Everlane media post.png"></div>
  <div class="item"><img src="logo apart.png"></div>
  <div class="item"><img src="Everlane event flyer.png"></div>

</div>

<div class="modal" id="modal">
  <span class="close" id="close">×</span>
  <img id="modalImg">
</div>

<script>
const items = document.querySelectorAll('.item img');
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modalImg');
const close = document.getElementById('close');

items.forEach(img=>{
  img.addEventListener('click',()=>{
    modal.style.display='flex';
    modalImg.src = img.src;
  });
});

close.onclick = ()=> modal.style.display='none';
modal.onclick = ()=> modal.style.display='none';
</script>

</body>

</html>
